# Анимации игрока
player:
  IDLE:
    type: STATIC
    frameSize: {width: 68, height: 118}
    frames:
      right:
        - {x: 0, y: 0}
      left:
        - {x: 0, y: 118}
    
  MOVING:
    type: LOOPED
    frameSize: {width: 68, height: 118}
    oneFrameDuration: 150
    frames:
      right:
        - {x: 0, y: 0}
        - {x: 68, y: 0}
        - {x: 136, y: 0}
      left:
        - {x: 0, y: 118}
        - {x: 68, y: 118}
        - {x: 136, y: 118}
  
  ATTACKING:
    type: ONE_SHOT
    frameSize: {width: 90, height: 118}
    oneFrameDuration: 100
    leftAnimationOffset: -23
    frames:
      right:
        - {x: 204, y: 0}
        - {x: 294, y: 0}
        - {x: 384, y: 0}
      left:
        - {x: 204, y: 118}
        - {x: 294, y: 118}
        - {x: 384, y: 118}

